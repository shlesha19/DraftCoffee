services:
  draft-coffee-mantha:
    build: .
    container_name: draft-coffee-mantha
    environment:
      - OPENAI_API_KEY=your-openai-api-key-here
      - OPENROUTER_API_KEY=your-openrouter-api-key-here
      - GMAIL_USER=your-gmail@gmail.com
      - GMAIL_APP_PASSWORD=your-gmail-app-password
    stdin_open: true
    ports:
      - "5000"
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: true
